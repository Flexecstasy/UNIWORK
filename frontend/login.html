<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniWork — Вход</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="uw-auth-page">
  <div class="uw-auth-card">
    <div class="logo-area">
      <a href="index.html" class="uw-logo" style="justify-content:center;font-size:1.6rem">Uni<span>Work</span></a>
    </div>
    <h1>Добро пожаловать</h1>
    <p class="subtitle">Войдите, чтобы откликаться на вакансии</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" class="form-control-uw" required placeholder="student@university.kz">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" class="form-control-uw" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-primary-uw" style="width:100%;margin-top:.5rem">Войти</button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:.9rem;color:var(--muted)">
      Нет аккаунта? <a href="register.html" style="color:var(--amber);font-weight:600">Зарегистрироваться</a>
    </p>
  </div>
</div>
<div class="uw-toast" id="uw-toast"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>initLogin();</script>
</body>
</html>
